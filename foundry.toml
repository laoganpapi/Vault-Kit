[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
gas_reports = ["YieldVault", "AaveLeverageStrategy", "AaveDeltaNeutralStrategy", "GmxGmPoolStrategy"]

[profile.default.fuzz]
runs = 10000
max_test_rejects = 100000

[profile.default.invariant]
runs = 1000
depth = 50

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
